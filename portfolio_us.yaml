# 美股持倉追蹤清單(quarterly_check_us.py 讀)。美股是季報為主、無月營收,故走季度檢查。
# 證偽條件改用季度數字。鍵名用 sym(非台股的 sid)。
# ★ 美股有 FMP 真實 ROIC(不像台股近似)→ 可直接用 ROIC<門檻 當「資本配置失血」證偽
# ★ 目標價/停損價:停損建議用 stop_anchors 的 PE/PBR 5年位階錨算(美股財報齊整)

positions: []                    # 範例(刪除#開始使用):
# - sym: "GOOGL"
#   name: "Alphabet"
#   分類: "⭐A級+成長卡位(PEG<1)"
#   買進: { 日期: "2026-06-24", 價: 347 }       # 真實成交均價(美元)
#   股數: 0                                       # 美股以「股」計
#   目標價: 0
#   停損價: 0                                     # 用 PE法/PBR法財報錨算(見 stop_anchors)
#   證偽_營收:
#     單季YoY≤: 0                # 季營收年增 ≤ 0% → 🚨
#   證偽_EPS:
#     單季YoY≤: 0
#     連續下滑季數: 2
#   證偽_ROIC:
#     跌破: 12                   # ROIC < 12% → 資本效率惡化(美股有真實 ROIC,比台股強)
#   證偽_毛利率:
#     跌破: 50                   # 填該股真實毛利 − 2pp
#   時間停損_季數: 3
#   額外註記: ""
