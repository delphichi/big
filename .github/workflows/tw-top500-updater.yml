name: 台股市值前500大更新

on:
  workflow_dispatch:
    inputs:
      top_n:
        description: "取前 N 大 (預設 500)"
        required: false
        default: "500"
        type: string

permissions:
  contents: write

jobs:
  updater:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pandas

      - name: 抓市值前 N 大
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TOP_N: ${{ inputs.top_n }}
        run: python tw_top500_updater.py

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist_tw_500.txt data/watchlist_tw_500.csv || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 台股市值前 ${{ inputs.top_n }} 大 watchlist 更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
