name: 台股五維總篩選定時執行

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC = 台北 14:00;每月 11 號(納入最新月營收)
    - cron: "0 6 11 * *"

permissions:
  contents: write

jobs:
  total-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 最重:每檔拉5年財報+5年每日PE/PB+2年股價+大盤

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy openpyxl requests

      - name: Run total screener
        env:
          # repo → Settings → Secrets → Actions 新增 FINMIND_TOKEN;資料量大務必設
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python total_screener.py

      # ★ 路徑改成 data/(腳本現在輸出到 data/);upload-artifact 升 v6(Node24 原生)
      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v6
        with:
          name: taiwan-total-screen
          path: data/台股五維總篩選.xlsx
          if-no-files-found: error
          retention-days: 90

      - name: Commit output to repo
        run: |
          STAMP=$(date -u +%Y%m%d)
          cp data/台股五維總篩選.xlsx "data/${STAMP}_台股五維總篩選.xlsx"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "沒有新檔案,略過 commit"
          else
            git commit -m "data: 自動更新台股五維總篩選 ${STAMP}"
            git push
          fi
