name: 美股持倉季度追蹤

on:
  workflow_dispatch:
  schedule:
    # 每週一 13:00 UTC (避開週末,美股財報週通常 Mon-Thu)
    - cron: "0 13 * * 1"

permissions:
  contents: write

jobs:
  us-quarterly-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install yfinance pandas openpyxl pyyaml
      - name: Run US quarterly check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python quarterly_check_us.py
      - name: Commit report
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/美股_持倉季度追蹤.xlsx || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 美股持倉季度追蹤 $(date -u +%Y%m%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
