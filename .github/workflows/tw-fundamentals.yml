name: 台股 財報估值

on:
  workflow_dispatch:          # Actions 頁面手動執行
    inputs:
      full_market:
        description: "全市場模式:深抓 ~2000 檔(否則僅 PICKS 精選)。一次跑不完,靠快取續跑多輪"
        type: boolean
        default: false
  schedule:
    # 06:00 UTC = 台北 14:00;每週一(財報季度才變,週更足夠;靠快取續抓、跑完即快)
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  tw-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 35       # 腳本自身 30 分自停;此為硬上限,控 Actions 計費

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy openpyxl requests lxml

      - name: Run TW fundamentals(PICKS 精選 / 全市場視 full_market)
        env:
          # repo → Settings → Secrets and variables → Actions 新增 FINMIND_TOKEN
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          # 手動勾 full_market 才掃全市場;cron 自動跑 inputs 為空 → 維持 PICKS
          FULL_MARKET: ${{ github.event.inputs.full_market == 'true' && '1' || '' }}
        run: python fetch_fundamentals_tw.py

      - name: Upload Excel as artifact
        if: always()                       # 即使中途被取消,也上傳目前進度檔
        uses: actions/upload-artifact@v6
        with:
          name: tw-fundamentals
          path: data/台股財報估值.xlsx
          if-no-files-found: warn
          retention-days: 90

      - name: Commit output to repo
        if: always()
        run: |
          STAMP=$(date -u +%Y%m%d)
          if [ -f "data/台股財報估值.xlsx" ]; then
            cp "data/台股財報估值.xlsx" "data/${STAMP}_台股財報估值.xlsx"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "沒有新檔案,略過 commit"; exit 0
          fi
          git commit -m "data: 台股 財報估值(179檔, 自算PER) ${STAMP}"
          # 輸出檔(cache JSON / 二進位 Excel)每次重新產生,rebase 必撞 add/add 衝突。
          # 改用 fetch + merge -X ours:衝突一律保留本次最新產物,同時併入 main 其他非衝突變更。
          for i in 1 2 3 4 5; do
            git fetch origin main || { echo "fetch 失敗,重試 $i ..."; sleep 6; continue; }
            if git merge -X ours --no-edit origin/main && git push origin HEAD:main; then
              echo "pushed"; exit 0
            fi
            git merge --abort 2>/dev/null || true
            echo "push 衝突,重試 $i ..."; sleep 6
          done
          echo "push 最終失敗(進度仍在 artifact)"; exit 1
