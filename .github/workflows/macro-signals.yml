name: 總經7信號燈週報 + Email

on:
  workflow_dispatch:
  schedule:
    # 每週日台北 09:00 (週六 UTC 01:00) — 週末沒交易,數據穩定
    - cron: "0 1 * * 0"

permissions:
  contents: write

jobs:
  signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 抓 7 信號
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python macro_signals.py

      - name: 產 email
        id: email_prep
        run: |
          python macro_signals_email.py
          echo "subject=$(cat /tmp/macro_subject.txt)" >> $GITHUB_OUTPUT

      - name: 寄 email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.email_prep.outputs.subject }}
          html_body: file:///tmp/macro_body.html
          to: delphichi@gmail.com
          from: 總經週報 <${{ secrets.GMAIL_USER }}>
          attachments: data/macro_signals.xlsx
          convert_markdown: false

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro_signals.xlsx data/macro_signals_log.csv || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 總經週報 ${TODAY:-update}"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
