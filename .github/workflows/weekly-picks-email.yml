name: 週報心動股 + Email (全自動)

on:
  workflow_dispatch:
  schedule:
    # 每週日台北 09:30 (週六 UTC 01:30)
    - cron: "30 1 * * 0"

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl numpy

      # ═══════════ 台股 4 大 dashboard ═══════════
      - name: 1️⃣ 台股籌碼儀表板
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          WORKERS: "4"
          DAYS: "90"
        run: python tw_chip_dashboard.py || echo "chip 失敗, 繼續"

      - name: 2️⃣ 台股報酬雷達
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          WORKERS: "4"
        run: python tw_return_radar.py || echo "return 失敗, 繼續"

      - name: 3️⃣ 台股警戒掃描
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          WORKERS: "4"
        run: python tw_alert_screener.py || echo "alert 失敗, 繼續"

      - name: 4️⃣ 台股總經儀表板
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python tw_macro_dashboard.py || echo "macro 失敗, 繼續"

      - name: 5️⃣ 台股六維交叉
        run: python tw_six_dim.py || echo "tw_six_dim 失敗, 用既有資料"

      # ═══════════ 美股 dashboard ═══════════
      - name: 6️⃣ 美股全景儀表板 (DCF + Altman + 內部人 + 國會)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          WORKERS: "6"
        run: python us_full_dashboard.py || echo "us_full 失敗, 用既有資料"

      - name: 7️⃣ 美股六維交叉
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python us_six_dim.py || echo "us_six_dim 失敗, 用既有資料"

      # ═══════════ 美國總經 ═══════════
      - name: 8️⃣ 美國總經 15 信號
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python macro_signals.py || echo "macro_signals 失敗, 用既有"

      # ═══════════ 組 email + 寄 ═══════════
      - name: 9️⃣ 組週報 email
        run: python weekly_picks_email.py

      - name: 讀 subject
        id: prep
        run: |
          SUB=$(cat /tmp/weekly_subject.txt)
          echo "subject=$SUB" >> $GITHUB_OUTPUT

      - name: 🔟 寄 Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.prep.outputs.subject }}
          html_body: file:///tmp/weekly_body.html
          to: delphichi@gmail.com
          from: 心動股週報 <${{ secrets.GMAIL_USER }}>
          attachments: "data/美股95檔_六維交叉.xlsx,data/台股100檔_六維交叉.xlsx,data/macro_signals.xlsx,data/台股_總經儀表板.xlsx"
          convert_markdown: false

      - name: Commit 全部新資料
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.xlsx data/weekly_picks_prev.json 2>/dev/null || true
          git add data/macro_signals_log.csv 2>/dev/null || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 週報全自動更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
