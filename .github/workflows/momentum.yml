name: 台股資金面三指標每日掃描

# ── 觸發條件 ───────────────────────────────
on:
  workflow_dispatch:          # Actions 頁面可手動執行
  schedule:
    # GitHub cron 用 UTC。06:30 UTC = 台北 14:30(收盤後約一小時)
    # 只用股價、資料輕,故每個交易日都跑;1-5 = 週一到週五(週末不開盤)
    # 註:GitHub cron 不認台股假日,遇休市日會重抓到同一份資料,無害
    - cron: "30 6 * * 1-5"

permissions:
  contents: write             # 若要 commit 回 repo 留存歷史

jobs:
  momentum:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4          # 最新可用 v6;v4 穩定不棄用

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy openpyxl

      - name: Run momentum scan
        env:
          # repo → Settings → Secrets and variables → Actions 新增 FINMIND_TOKEN
          # 此腳本已自環境變數讀取,毋須改 code
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python momentum_rs.py

      # ── 產物保存 1:存成 artifact(一定執行)──────────
      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4   # 最新可用 v7;v4 穩定不棄用
        with:
          name: taiwan-momentum
          path: 台股資金面三指標.xlsx
          if-no-files-found: error
          retention-days: 90

      # ── 產物保存 2(可選):commit 回 repo 的 data-momentum/ 留每日快照 ──
      - name: Commit output to repo
        run: |
          mkdir -p data-momentum
          STAMP=$(date -u +%Y%m%d)
          cp 台股資金面三指標.xlsx "data-momentum/${STAMP}_台股資金面三指標.xlsx"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-momentum/
          if git diff --staged --quiet; then
            echo "沒有新檔案,略過 commit"
          else
            git commit -m "data: 每日資金面三指標 ${STAMP}"
            git push
          fi
