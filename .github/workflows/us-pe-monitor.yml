name: 美股PE PEG F/PE 監看表

on:
  workflow_dispatch:
    inputs:
      watchlist:
        description: "自訂監看清單 (逗號分隔,空白則用預設 96 檔)"
        required: false
        default: ""
  schedule:
    # 每週一三五 美股盤後 07:00 UTC (= 台北 15:00 / 美東收盤後 ~2hr)
    - cron: "0 7 * * 1,3,5"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 跑 PE/PEG 監看
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          WATCHLIST: ${{ inputs.watchlist }}
        run: python us_pe_monitor.py

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/美股PE監看表.xlsx || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 美股PE監看表更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
