name: 持倉月營收追蹤

on:
  workflow_dispatch:
  schedule:
    # 11 日 09:00 UTC = 台北 17:00(月營收 10 日多已公布)
    - cron: "0 9 11 * *"

permissions:
  contents: write

jobs:
  monthly-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install FinMind pandas openpyxl pyyaml requests lxml
      - name: Run monthly check
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python monthly_revenue_check.py
      - name: Commit report
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/持倉月度追蹤.xlsx || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 持倉月度追蹤 $(date -u +%Y%m%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
