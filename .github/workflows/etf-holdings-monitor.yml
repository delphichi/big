name: 主動式ETF持股監看

# 每日抓跨投信主動式ETF成分,diff昨天看經理人買賣。CI開放網路(本機proxy擋)。
on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "指定抓取日期 YYYYMMDD(回補/驗證用,空=今天)"
        type: string
        default: ""
      backfill_days:
        description: "回補近N天建立一週快照(0=只跑單日)"
        type: string
        default: "0"
  schedule:
    # 10:00 UTC = 台北 18:00(收盤後PCF已更新);週一~週五
    - cron: "0 10 * * 1-5"

permissions:
  contents: write

jobs:
  etf-holdings:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pandas openpyxl requests

      - name: 跑主動式ETF持股監看
        env:
          ETF_DATE: ${{ github.event.inputs.target_date }}
          ETF_BACKFILL_DAYS: ${{ github.event.inputs.backfill_days }}
        run: python etf_holdings_monitor.py

      - name: Commit 快照
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_holdings || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 主動式ETF持股快照 $(date -u +%Y%m%d)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then echo pushed; exit 0; fi
            echo "重試 $i ..."; sleep 6
          done
          echo "push 失敗"; exit 1
