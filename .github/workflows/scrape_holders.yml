name: 每週千張大戶自動爬取

on:
  # ── 每週五 18:30 台灣時間（UTC+8）自動執行
  schedule:
    - cron: '30 10 * * 5'   # UTC 10:30 = 台灣 18:30

  # ── 也可以手動觸發（網頁按按鈕）
  workflow_dispatch:
    inputs:
      stocks:
        description: '股票代號（逗號分隔，留空用預設清單）'
        required: false
        default: ''
      weeks:
        description: '抓幾週歷史資料'
        required: false
        default: '8'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 讓 Actions 可以 commit 回 repo

    steps:
      # 1. 取得程式碼
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安裝套件
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. 執行爬蟲
      - name: Run scraper
        env:
          # 手動觸發時可傳入參數
          INPUT_STOCKS: ${{ github.event.inputs.stocks }}
          INPUT_WEEKS:  ${{ github.event.inputs.weeks || '8' }}
        run: python scripts/scraper.py

      # 5. 把結果 commit 回 repo（data/ 資料夾）
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 自動更新千張大戶資料 $(date +'%Y/%m/%d')"
          git push

      # 6. 同時上傳 Excel 成 Artifact（可直接下載）
      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: 千張大戶週報_${{ github.run_number }}
          path: data/*.xlsx
          retention-days: 30
