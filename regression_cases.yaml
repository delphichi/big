# 體檢系統「回歸測試金樣本」— 11 檔已人工驗證過的標的
# =====================================================================
# 用途:改完 code 跑 test_health_regression.py,確認系統判讀沒退化。
# 兩類:① 8 檔持倉(系統該給對的評等/鬧鐘)
#       ② 3 檔抓到雷的股票(系統該抓到具體財報問題 — 偵錯範例)
# 期望用「範圍/關鍵字」而非「精確分數」,容忍資料微幅漂移,只抓真正的退化。
# 每次人工複核後若期望有變,更新這份(它是 single source of truth)。

cases:
  # ── ① 8 檔持倉:好公司,系統該給合理判讀 ──
  - sid: "2753"
    name: "八方雲集"
    類別: "持倉/wang者"
    期望:
      評等_在: [A, B]
      鬧鐘_不含: "陷阱"           # 不該被誤標便宜陷阱
      鬧鐘_不含2: "過熱"
    註: "配息防禦+小幅成長,真綠燈"

  - sid: "5904"
    name: "寶雅"
    類別: "持倉/估值頂峰"
    期望:
      評等_在: [A, B]
      扣分_至多: -5              # ⑪ 該抓到高槓桿(負債80%),penalty <= -5
      漏洞_含: "槓桿"
    註: "A級好公司但隱性槓桿,⑪該扣分"

  - sid: "4506"
    name: "崇友"
    類別: "持倉"
    期望:
      評等_在: [A, B]
    註: "電梯工程,乾淨A級"

  - sid: "2421"
    name: "建準"
    類別: "持倉/AI散熱"
    期望:
      評等_在: [A, B]
    註: "AI散熱供應鏈"

  - sid: "3005"
    name: "神基"
    類別: "持倉"
    期望:
      評等_在: [A, B]
    註: "工業電腦"

  - sid: "2912"
    name: "統一超"
    類別: "持倉/便宜陷阱"
    期望:
      鬧鐘_含: "陷阱"            # ⑪聯動必須觸發:現價低於深度買點但財務變差→陷阱
      扣分_至多: -10            # 短期償債警報 penalty <= -10
      漏洞_含: "償債"
    註: "★關鍵測試:鬧鐘 vs ⑪聯動。若這檔變回💎深度買點=聯動壞了"

  - sid: "9918"
    name: "欣天然"
    類別: "持倉/該撤"
    期望:
      評等_在: [C, D]
      漏洞_含: "存貨爆衝"        # ★新規則:存貨年增147% vs 營收11% 必須觸發
    註: "★關鍵測試:存貨爆衝告警。若這檔漏洞沒有存貨=新規則壞了"

  - sid: "8016"
    name: "矽創"
    類別: "持倉/該撤"
    期望:
      評等_在: [D]
      扣分_至多: -10
    註: "EPS連年衰退,D級"

  # ── ② 3 檔抓到雷的股票:偵錯範例,系統該抓到具體財報問題 ──
  - sid: "3293"
    name: "鈊象"
    類別: "雷股/ROE幻象"
    期望:
      漏洞_含: "EPS"            # EPS連年衰退 或 EPS遠落後營收(盈餘品質爛)
    註: "★經典雷:ROE 94 但EPS連年衰退=盈餘品質幻象。系統該抓到EPS問題"

  - sid: "2345"
    name: "智邦"
    類別: "雷股/毛利低檔"
    期望:
      漏洞_含: "毛利"            # 毛利壓歷史低檔
    註: "A級好公司但毛利在歷史低檔=競爭加劇訊號"

  - sid: "3406"
    name: "玉晶光"
    類別: "雷股/毛利低檔+貴"
    期望:
      漏洞_含: "毛利"            # 毛利壓歷史低檔
    註: "光學鏡頭轉型期,毛利低檔+PEG貴"
