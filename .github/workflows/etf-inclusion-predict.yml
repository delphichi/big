name: 0050 納入預測

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["台股 財報估值"]
    types: [completed]

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install FinMind pandas numpy openpyxl requests lxml

      - name: 回填市值(股本 × 收盤)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python backfill_market_cap.py

      - name: 重跑 體檢總表
        run: python stock_health_check.py || echo "health check 失敗,繼續"

      - name: 重跑 拐點掃描
        run: python stock_inflection_scan.py || echo "拐點掃描失敗,繼續"

      - name: 跑 0050 納入預測
        run: python stock_etf_inclusion_predict.py

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BR="${GITHUB_REF_NAME}"
          # 只提交輸出 xlsx,不碰 _tw_val_cache(快取由 tw-fundamentals 維護;
          # 否則 backfill 後的 float 重序列化會造成上百檔雜訊 diff + 合併衝突)
          git add "data/台股財報估值.xlsx" "data/台股_體檢總表.xlsx" \
                  "data/台股_拐點掃描.xlsx" "data/台股_0050納入預測.xlsx" 2>/dev/null || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 0050 納入預測 $(date -u +%Y%m%d)"
          # 推到觸發此 run 的同一分支;衝突一律保留本次最新產物(-X ours)
          for i in 1 2 3 4 5; do
            git stash -u >/dev/null 2>&1 || true        # 暫存未追蹤的快取變動,避免擋住 merge
            git fetch origin "$BR" -q || true
            git merge -X ours --no-edit "origin/$BR" >/dev/null 2>&1 || git merge --abort 2>/dev/null || true
            if git push origin "HEAD:$BR"; then echo pushed; exit 0; fi
            echo "push 重試 $i ..."; sleep 6
          done
          echo "push 最終失敗(資料仍在 artifact / 可手動補)"; exit 1
