name: 月營收年增掃描

on:
  workflow_dispatch:          # Actions 頁面可手動執行
  schedule:
    # 06:00 UTC = 台北 14:00;每月 12 號(月營收 10 號前發布,留 FinMind 落後緩衝)
    - cron: "0 6 12 * *"

permissions:
  contents: write             # 要 commit 結果回 repo

jobs:
  revenue-yoy:
    runs-on: ubuntu-latest
    # 全市場(~1800 檔)受 FinMind 每小時額度約束,約 3 小時;放寬到 350 分鐘(上限 360)
    # 若只掃幾百檔的清單,可自行調小以省資源
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy openpyxl requests

      - name: Run revenue YoY scanner
        env:
          # repo → Settings → Secrets and variables → Actions 新增 FINMIND_TOKEN
          # 大量掃描務必設 token(約 600 次/hr),否則免費額度(約 300/hr)會拖很久且頻繁限流
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python revenue_yoy_scanner.py

      # ── 產物保存 1:artifact(upload-artifact 用 v6,Node24 原生、無警告)──
      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v6
        with:
          name: taiwan-revenue-yoy
          path: data/月營收年增掃描.xlsx
          if-no-files-found: error
          retention-days: 90

      # ── 產物保存 2:在 data/ 留帶日期快照並 commit(連同 progress 檔)──
      - name: Commit output to repo
        if: always()        # 即使前面逾時/失敗,也盡量把已完成的進度 commit 回去
        run: |
          STAMP=$(date -u +%Y%m%d)
          if [ -f "data/月營收年增掃描.xlsx" ]; then
            cp "data/月營收年增掃描.xlsx" "data/${STAMP}_月營收年增掃描.xlsx"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "沒有新檔案,略過 commit"
          else
            git commit -m "data: 月營收年增掃描 ${STAMP}"
            git push
          fi
