name: SLCA 投資感測器 v2(手動)

# 感測器每週需要人工填入當週原始資料(敘事/反共識/法人/三問答案),
# 因此只用手動觸發:先把當週輸入 commit 成 sensor_input.json,再來這裡 Run workflow。
on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "輸入 JSON 路徑(預設用範例檔)"
        default: "sensor_input.example.json"
        required: false
      auto:
        description: "是否額外用 FinMind 自動偵測①②③(需 FINMIND_TOKEN)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sensor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 引擎本身只用標準庫;--auto 才需要 FinMind/pandas
      - name: Install dependencies (auto 才需要)
        if: ${{ inputs.auto }}
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy requests

      - name: Run sensor
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          STAMP=$(date -u +%Y%m%d)
          python sensor.py --input "${{ inputs.input_file }}" \
            ${{ inputs.auto && '--auto' || '' }} \
            --out "data/SLCA_種子_${STAMP}.md"

      - name: Upload seeds as artifact
        uses: actions/upload-artifact@v6
        with:
          name: slca-seeds
          path: data/SLCA_種子_*.md
          if-no-files-found: error
          retention-days: 90

      - name: Commit output to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "沒有新檔案,略過 commit"
          else
            git commit -m "data: 自動更新 SLCA 感測器種子 $(date -u +%Y%m%d)"
            git push
          fi
