name: 台股全市場年度數據

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "起年"
        required: false
        default: "2016"
        type: string
      end_year:
        description: "迄年"
        required: false
        default: "2025"
        type: string

permissions:
  contents: write

jobs:
  annual:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 抓全市場 10 年年度數據
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          START_YEAR: ${{ inputs.start_year }}
          END_YEAR: ${{ inputs.end_year }}
          WORKERS: "3"
        run: python tw_all_market_annual.py

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/台股全市場_年度數據.xlsx || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 台股全市場 ${{ inputs.start_year }}~${{ inputs.end_year }} 年度更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
