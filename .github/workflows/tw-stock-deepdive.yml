name: 台股單檔深度研究

on:
  workflow_dispatch:
    inputs:
      codes:
        description: "代號 (空白分隔, 例: 2330 6139 5274, 多檔會多份 xlsx+md)"
        required: true
        default: "2330"
        type: string

permissions:
  contents: write

jobs:
  deepdive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 跑深度分析
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python tw_stock_deepdive.py ${{ inputs.codes }}

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deepdive/*.xlsx data/deepdive/*.md 2>/dev/null || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 台股深度研究 ${{ inputs.codes }}"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
