name: 3:1 入場清單 (每週一)

on:
  workflow_dispatch:
    inputs:
      markets:
        description: "跑哪些市場 (us / tw / both)"
        default: "both"
        required: false
  schedule:
    # 每週一 台北 09:30 (UTC 01:30) — 美股上週五收盤後 + 台股週一開盤前
    - cron: "30 1 * * 1"

permissions:
  contents: write

jobs:
  us:
    if: github.event_name == 'schedule' || github.event.inputs.markets == 'us' || github.event.inputs.markets == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 掃 US watchlist
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python entry_calc.py --batch us

      - name: 檢查有無進場區檔
        id: check
        run: |
          if [ -s /tmp/entry_signals_us_subject.txt ]; then
            SUB=$(cat /tmp/entry_signals_us_subject.txt)
            echo "subject=$SUB" >> $GITHUB_OUTPUT
            echo "has=yes" >> $GITHUB_OUTPUT
          else
            echo "has=no" >> $GITHUB_OUTPUT
            echo "無進場區檔, 不寄 email"
          fi

      - name: 寄 Gmail (有進場區才寄)
        if: steps.check.outputs.has == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.check.outputs.subject }}
          html_body: file:///tmp/entry_signals_us_body.html
          to: delphichi@gmail.com
          from: 3:1 入場清單 <${{ secrets.GMAIL_USER }}>
          attachments: data/entry_signals_us.xlsx
          convert_markdown: false

      - name: Commit snapshot
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entry_signals_us.xlsx 2>/dev/null || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: US 3:1 入場清單更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done

  tw:
    if: github.event_name == 'schedule' || github.event.inputs.markets == 'tw' || github.event.inputs.markets == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 掃 TW watchlist
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python entry_calc.py --batch tw

      - name: 檢查有無進場區檔
        id: check
        run: |
          if [ -s /tmp/entry_signals_tw_subject.txt ]; then
            SUB=$(cat /tmp/entry_signals_tw_subject.txt)
            echo "subject=$SUB" >> $GITHUB_OUTPUT
            echo "has=yes" >> $GITHUB_OUTPUT
          else
            echo "has=no" >> $GITHUB_OUTPUT
            echo "無進場區檔, 不寄 email"
          fi

      - name: 寄 Gmail (有進場區才寄)
        if: steps.check.outputs.has == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.check.outputs.subject }}
          html_body: file:///tmp/entry_signals_tw_body.html
          to: delphichi@gmail.com
          from: 3:1 入場清單 <${{ secrets.GMAIL_USER }}>
          attachments: data/entry_signals_tw.xlsx
          convert_markdown: false

      - name: Commit snapshot
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/entry_signals_tw.xlsx 2>/dev/null || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: TW 3:1 入場清單更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
