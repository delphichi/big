name: 台股A級120檔長期報酬榜

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  returns:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests pandas openpyxl

      - name: 算 10/5/3/1y 含息年化
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python tw_watchlist_returns.py

      - name: Commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/台股_A級長期報酬榜.xlsx || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 台股A級長期報酬榜更新"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
