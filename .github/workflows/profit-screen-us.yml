name: 美股全市場獲利初篩

# SEC EDGAR 免費,不搶 FMP 額度。手動觸發,斷點續跑(全美~1萬檔,1-2輪掃完)。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  profit-screen-us:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pandas numpy requests

      - name: 跑美股全市場獲利初篩(SEC,斷點續跑)
        env:
          # repo → Settings → Secrets:SEC_USER_AGENT =「你的名字 你的email」(SEC 強制,否則 403)
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python build_universe_profit_us.py

      - name: Commit 候選 + 快取(快取需 commit 才能跨 CI 續跑)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/美股_獲利型候選.txt data/_profit_cache_us data/_sec_cik_map.json || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 美股全市場獲利初篩(續跑)$(date -u +%Y%m%d-%H%M)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then echo pushed; exit 0; fi
            echo "重試 $i ..."; sleep 6
          done
          echo "push 失敗"; exit 1
