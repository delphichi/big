name: 美股 體檢總表

on:
  workflow_dispatch:
    inputs:
      watch_file:
        description: '名單檔 (tickers_us_full.txt=全市場7874檔深抓;tickers_us.txt=精選)'
        required: false
        default: 'tickers_us_full.txt'
      max_fetch:
        description: '本輪上限 (付費FMP一把梭設大;免費版設45)'
        required: false
        default: '4000'
  schedule:
    # 每天 10:00 UTC — 增量續抓(付費FMP 300/分;全市場分數輪跑完, 之後維持更新)
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  us-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 55       # 付費FMP 300/分;一輪約抓 ~3000 檔, 7874 約 3 輪續跑完

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run US health check (FMP, 增量)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          US_WATCH_FILE: ${{ inputs.watch_file || 'tickers_us_full.txt' }}
          US_MAX_FETCH: ${{ inputs.max_fetch || '4000' }}
        run: python fetch_fundamentals_us.py

      - name: 下游報表(拐點 + 未來PE,讀體檢表免費重算)
        if: always()
        run: |
          python stock_inflection_scan_us.py || echo "拐點略過"
          python forward_pe_us.py || echo "未來PE略過"

      - name: Commit report to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/美股體檢總表.xlsx "data/美股_拐點掃描.xlsx" "data/美股_未來PE報表.xlsx" || true
          if git diff --staged --quiet; then echo "無變更"; exit 0; fi
          git commit -m "data: 美股體檢總表 $(date -u +%Y%m%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main -q && git merge origin/main -X ours --no-edit >/dev/null 2>&1
            git push && { echo pushed; exit 0; }
            sleep 6
          done
